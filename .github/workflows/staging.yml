name: Staging Pipeline
on:
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  deploy-and-audit:
    runs-on: ubuntu-latest
    environment: Staging
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Wait for CI Validation
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'validate'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Supabase Staging Migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          npx supabase login --token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          npx supabase link --project-ref "${{ vars.SUPABASE_PROJECT_ID }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          npx supabase db push

      - name: Supabase Staging Functions
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase functions deploy invite-user
          npx supabase functions deploy send-push --no-verify-jwt

      - name: Vercel Staging Deploy
        id: deploy
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(npx vercel --token ${{ secrets.VERCEL_TOKEN }} --yes)
          
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          
          echo "### Staging Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "Preview URL: $DEPLOY_URL" >> $GITHUB_STEP_SUMMARY

      - name: Get Timestamp
        id: timestamp
        run: echo "formatted_date=$(date +'%d/%m/%y at %H:%M')" >> $GITHUB_OUTPUT

      - name: Post Preview URL to PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: mshick/add-pr-comment@v3
        with:
          message-id: vercel-deploy-status 
          message: |
            ### Staging Deployment Ready!
            **Preview URL**: ${{ steps.deploy.outputs.url }}
            _Last updated at: ${{ steps.timestamp.outputs.formatted_date }}_
            